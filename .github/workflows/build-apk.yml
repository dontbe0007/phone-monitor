name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Build APK
        run: |
          curl -sSL "https://services.gradle.org/distributions/gradle-8.2-bin.zip" -o gradle.zip
          unzip -q gradle.zip
          chmod +x gradle-8.2/bin/gradle
          gradle-8.2/bin/gradle wrapper --gradle-version=8.2
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PhoneMonitor-Debug
          path: app/build/outputs/apk/debug/*.apk
